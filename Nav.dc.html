<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  .navlink { position: relative; color: #232B35; font-size: 15px; font-weight: 500; letter-spacing: .01em; text-decoration: none; transition: color .2s ease; white-space: nowrap; }
  .navlink:hover { color: #B3262D; }
  .navlink.active { color: #16324F; font-weight: 600; }
  .navlink.active::after { content:''; position:absolute; left:0; right:0; bottom:-7px; height:2px; background:#B3262D; border-radius:2px; }
  .nav-cta { transition: transform .2s ease, box-shadow .2s ease; cursor:pointer; text-decoration:none; }
  .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 22px -10px rgba(22,50,79,.55); }
  .nav-toggle { display:none; }
  .nav-mobile { display:none; }
  @media (max-width: 1080px) {
    .nav-links { display: none !important; }
    .nav-toggle { display: inline-flex !important; }
    .nav-mobile.open { display: block !important; }
  }
</style>
</helmet>
<div ref="{{ headerRef }}" style="position:fixed;top:0;left:0;right:0;z-index:100;font-family:'Hanken Grotesk',system-ui,sans-serif;background:rgba(247,246,242,0);border-bottom:1px solid rgba(22,50,79,0);transition:background .3s ease, border-color .3s ease, box-shadow .3s ease, backdrop-filter .3s ease;">
  <div style="max-width:1240px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:40px;padding:18px 48px;">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;flex:none;">
<div style="line-height:1.05;">
        <div style="font-weight:700;font-size:17px;color:#16324F;letter-spacing:-.01em;">ASEAN Australia</div>
        <div style="font-weight:600;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:#B3262D;margin-top:3px;">Association</div>
      </div>
    </a>
    <div class="nav-links" style="display:flex;align-items:center;gap:26px;flex:none;">
      <a class="navlink {{ homeCls }}" href="Home.dc.html">Home</a>
      <a class="navlink {{ aboutCls }}" href="About.dc.html">About Us</a>
      <a class="navlink {{ connectCls }}" href="Connect.dc.html">Connect &amp; Grow</a>
      <a class="navlink {{ eventsCls }}" href="Events.dc.html">Events</a>
      <a class="navlink {{ membershipCls }}" href="Membership.dc.html">Membership</a>
      <a class="navlink {{ contactCls }}" href="Contact.dc.html">Contact</a>
      <a class="nav-cta" href="Membership.dc.html" style="background:#16324F;color:#fff;font-weight:600;font-size:14px;padding:11px 20px;border-radius:9px;">Become a Member</a>
    </div>
    <button class="nav-toggle" onClick="{{ toggleMenu }}" aria-label="Menu" style="align-items:center;justify-content:center;width:44px;height:44px;border:1px solid rgba(22,50,79,.16);background:#fff;border-radius:10px;cursor:pointer;flex:none;padding:0;gap:4px;flex-direction:column;">
      <span style="display:block;width:18px;height:2px;background:#16324F;border-radius:2px;"></span>
      <span style="display:block;width:18px;height:2px;background:#16324F;border-radius:2px;"></span>
      <span style="display:block;width:18px;height:2px;background:#16324F;border-radius:2px;"></span>
    </button>
  </div>
  <div class="nav-mobile {{ menuCls }}" style="background:rgba(247,246,242,.98);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid rgba(22,50,79,.09);box-shadow:0 12px 30px -18px rgba(22,50,79,.4);">
    <div style="max-width:1240px;margin:0 auto;padding:12px 32px 22px;display:flex;flex-direction:column;gap:4px;">
      <a class="navlink {{ homeCls }}" href="Home.dc.html" style="padding:12px 4px;border-bottom:1px solid rgba(22,50,79,.06);">Home</a>
      <a class="navlink {{ aboutCls }}" href="About.dc.html" style="padding:12px 4px;border-bottom:1px solid rgba(22,50,79,.06);">About Us</a>
      <a class="navlink {{ connectCls }}" href="Connect.dc.html" style="padding:12px 4px;border-bottom:1px solid rgba(22,50,79,.06);">Connect &amp; Grow</a>
      <a class="navlink {{ eventsCls }}" href="Events.dc.html" style="padding:12px 4px;border-bottom:1px solid rgba(22,50,79,.06);">Events</a>
      <a class="navlink {{ membershipCls }}" href="Membership.dc.html" style="padding:12px 4px;border-bottom:1px solid rgba(22,50,79,.06);">Membership</a>
      <a class="navlink {{ contactCls }}" href="Contact.dc.html" style="padding:12px 4px;">Contact</a>
      <a class="nav-cta" href="Membership.dc.html" style="margin-top:12px;text-align:center;background:#16324F;color:#fff;font-weight:600;font-size:14px;padding:13px 20px;border-radius:9px;">Become a Member</a>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:76},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;about&quot;,&quot;connect&quot;,&quot;events&quot;,&quot;membership&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { menuOpen: false };
  constructor(props){ super(props); this.headerRef = React.createRef(); this.onScroll = this.onScroll.bind(this); }
  onScroll(){
    const el = this.headerRef.current; if(!el) return;
    if(window.scrollY > 24){
      el.style.background = 'rgba(247,246,242,.88)';
      el.style.backdropFilter = 'saturate(180%) blur(12px)';
      el.style.borderBottomColor = 'rgba(22,50,79,.09)';
      el.style.boxShadow = '0 8px 30px -20px rgba(22,50,79,.5)';
    } else {
      el.style.background = 'rgba(247,246,242,0)';
      el.style.backdropFilter = 'none';
      el.style.borderBottomColor = 'rgba(22,50,79,0)';
      el.style.boxShadow = 'none';
    }
  }
  componentDidMount(){ window.addEventListener('scroll', this.onScroll, {passive:true}); this.onScroll(); }
  componentWillUnmount(){ window.removeEventListener('scroll', this.onScroll); }
  renderVals(){
    const a = this.props.active;
    return {
      headerRef: this.headerRef,
      menuCls: this.state.menuOpen ? 'open' : '',
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      homeCls: a==='home'?'active':'',
      aboutCls: a==='about'?'active':'',
      connectCls: a==='connect'?'active':'',
      eventsCls: a==='events'?'active':'',
      membershipCls: a==='membership'?'active':'',
      contactCls: a==='contact'?'active':'',
    };
  }
}
</script>
</body>
</html>
